name: "Sync — Validate All rff82 Repos"

on:
  workflow_dispatch:
    inputs:
      validate_structure:
        description: "Validar estrutura dos repos (CLAUDE.md, ci.yml, wrangler.jsonc)"
        required: false
        default: true
        type: boolean
      copy_scripts:
        description: "Copiar push-local.sh e sync-rff82.sh para cada repo produto"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 8 * * 1" # Toda segunda-feira às 08:00 UTC

permissions:
  contents: read
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Listar repos do ecossistema
  # ─────────────────────────────────────────────────────────────────
  list-repos:
    name: List Ecosystem Repos
    runs-on: ubuntu-latest
    outputs:
      repos_matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Build repos matrix from ecosystem.json
        id: list
        run: |
          MATRIX=$(jq -c '[.products[] | {repo: .repo, has_worker: .has_worker, subdomain: .subdomain}]' \
            config/ecosystem.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Repos encontrados: $(echo $MATRIX | jq length)"

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Validar estrutura de cada repo (matrix)
  # ─────────────────────────────────────────────────────────────────
  validate:
    name: Validate ${{ matrix.product.repo }}
    runs-on: ubuntu-latest
    needs: list-repos
    if: ${{ inputs.validate_structure != false }}
    strategy:
      matrix:
        product: ${{ fromJson(needs.list-repos.outputs.repos_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Checkout product repo
        uses: actions/checkout@v4
        with:
          repository: rff82/${{ matrix.product.repo }}
          token: ${{ secrets.GH_PAT }}
          path: product-repo

      - name: Validate structure
        id: validate
        run: |
          chmod +x scripts/validate-repo-structure.sh
          scripts/validate-repo-structure.sh \
            "product-repo" \
            "${{ matrix.product.repo }}" \
            "${{ matrix.product.has_worker }}" \
            > /tmp/validate-${{ matrix.product.repo }}.json 2>&1 || true
          cat /tmp/validate-${{ matrix.product.repo }}.json

      - name: Upload validation result
        uses: actions/upload-artifact@v4
        with:
          name: validate-${{ matrix.product.repo }}
          path: /tmp/validate-${{ matrix.product.repo }}.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Claude gera relatório consolidado no Step Summary
  # ─────────────────────────────────────────────────────────────────
  sync-report:
    name: Claude Sync Report
    runs-on: ubuntu-latest
    needs: validate
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all validation results
        uses: actions/download-artifact@v4
        with:
          pattern: validate-*
          path: /tmp/validations/
          merge-multiple: true

      - name: Merge validation results
        run: |
          jq -s '.' /tmp/validations/*.json > /tmp/all-validations.json 2>/dev/null || echo "[]" > /tmp/all-validations.json
          cp /tmp/all-validations.json ./all-validations.json
          echo "=== Validações ==="
          cat ./all-validations.json

      - name: Claude sync report
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Read,Write --max-turns 5"
          prompt: |
            Você é o engenheiro de confiabilidade do ecossistema farpa.ai.
            Leia CLAUDE.md (contexto do ecossistema) e all-validations.json (resultado da validação de cada repo).

            Gere um relatório Markdown e escreva em /tmp/sync-summary.md:

            # Sync Report — farpa.ai Ecosystem
            Data: (data atual)

            ## Resumo
            - Total de repos: X
            - Críticos: X (com issues)
            - Warnings: X
            - OK: X

            ## Por Produto

            Para cada produto, uma linha de status:
            - ✅ **rff82/repo** — OK
            - ⚠️ **rff82/repo** — Warning: [descrição]
            - 🔴 **rff82/repo** — Crítico: [descrição]

            ## Ações Recomendadas
            (listar apenas se houver críticos ou warnings, com passos exatos)

            ---
            *Gerado por rff82/orchestrator-farpa · sync.yml*

      - name: Write Step Summary
        run: |
          if [ -f /tmp/sync-summary.md ]; then
            cat /tmp/sync-summary.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## Sync Report\nRelatório não gerado. Ver logs do Claude." >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────
  # Job 4: Copiar scripts para repos produto (condicional)
  # ─────────────────────────────────────────────────────────────────
  copy-scripts:
    name: Copy Orchestration Scripts
    runs-on: ubuntu-latest
    needs: list-repos
    if: ${{ inputs.copy_scripts == true }}
    strategy:
      matrix:
        product: ${{ fromJson(needs.list-repos.outputs.repos_matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts

      - name: Checkout parent repo for scripts
        uses: actions/checkout@v4
        with:
          repository: rff82/orchestrator-farpa
          token: ${{ secrets.GH_PAT }}
          path: orchestrator

      - name: Push scripts to product repo via API
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          REPO="rff82/${{ matrix.product.repo }}"
          for script in push-local.sh sync-rff82.sh; do
            # Ler scripts do repo pai (Projetos/) se existir
            if [ -f "../$script" ]; then
              CONTENT=$(base64 -w 0 < "../$script")
              SHA=$(gh api "repos/$REPO/contents/$script" --jq '.sha' 2>/dev/null || echo "")
              if [ -n "$SHA" ]; then
                gh api "repos/$REPO/contents/$script" \
                  -X PUT \
                  -f message="infra: sync orchestration scripts from orchestrator-farpa" \
                  -f content="$CONTENT" \
                  -f sha="$SHA" || echo "AVISO: Falha ao atualizar $script em $REPO"
              else
                gh api "repos/$REPO/contents/$script" \
                  -X PUT \
                  -f message="infra: add orchestration scripts from orchestrator-farpa" \
                  -f content="$CONTENT" || echo "AVISO: Falha ao criar $script em $REPO"
              fi
              echo "✓ $script → $REPO"
            fi
          done
